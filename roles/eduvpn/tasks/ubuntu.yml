---
- name: "EduVPN | Install dependencies"
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  become: true
  loop:
    - apt-transport-https
    - wget
    - gnupg

- name: "EduVPN | Ensure keyring directory exists"
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"
  become: true

- name: "EduVPN | Download and Add EduVPN Key"
  ansible.builtin.shell: |
    wget -O- https://app.eduvpn.org/linux/v4/deb/app+linux@eduvpn.org.asc | gpg --dearmor | sudo tee /usr/share/keyrings/eduvpn-v4.gpg >/dev/null
  args:
    creates: /usr/share/keyrings/eduvpn-v4.gpg
  become: true

- name: "EduVPN | Remove legacy EduVPN apt list"
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/eduvpn-v4.list
    state: absent
  become: true

- name: "EduVPN | Add EduVPN Repository"
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/eduvpn-v4.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://app.eduvpn.org/linux/v4/deb/
      Suites: {{ ansible_distribution_release }}
      Components: main
      Signed-By: /usr/share/keyrings/eduvpn-v4.gpg
  become: true

- name: "EduVPN | Update apt cache"
  ansible.builtin.apt:
    update_cache: true
  become: true

- name: "EduVPN | Install eduvpn-client"
  ansible.builtin.apt:
    name: eduvpn-client
    state: present
  become: true
