---
- include_tasks: Ubuntu.yml
  when: ansible_os_family == 'Debian'

- name: Run Arch Tasks
  ansible.builtin.include_tasks: Archlinux.yml
  when: ansible_os_family == 'Archlinux'

- name: "matugen | Config folder"
  ansible.builtin.file:
    mode: "0755"
    path: "{{ ansible_user_dir }}/.config/matugen"
    state: directory

- name: "matugen | Templates folder"
  ansible.builtin.file:
    mode: "0755"
    path: "{{ ansible_user_dir }}/.config/matugen/templates"
    state: directory

- name: "matugen | Deploy config.toml"
  ansible.builtin.copy:
    src: "matugen/config.toml"
    dest: "{{ ansible_user_dir }}/.config/matugen/config.toml"
    mode: "0644"

- name: "matugen | Deploy template files"
  ansible.builtin.copy:
    src: "matugen/templates/"
    dest: "{{ ansible_user_dir }}/.config/matugen/templates/"
    mode: "0644"

- name: "matugen | Regenerate theme from current wallpaper"
  ansible.builtin.shell: |
    set -e
    wallpaper_path="{{ ansible_user_dir }}/.dotfiles/roles/bash/files/wallpapers/wallpaper"
    current_wallpaper="$(readlink -f "$wallpaper_path")"
    if [ -n "$current_wallpaper" ] && [ -f "$current_wallpaper" ]; then
      matugen image "$current_wallpaper"
      if command -v matugen-reload >/dev/null 2>&1; then
        matugen-reload
      fi
    fi
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ ansible_user_dir }}/.cargo/bin:{{ ansible_user_dir }}/.local/bin:/usr/local/bin:{{ ansible_env.PATH }}"
  changed_when: false
