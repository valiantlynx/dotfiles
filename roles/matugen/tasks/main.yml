---
- import_tasks: Ubuntu.yml
  when: ansible_os_family == 'Debian'

- name: Run Arch Tasks
  ansible.builtin.import_tasks: Archlinux.yml
  when: ansible_os_family == 'Archlinux'

- name: "matugen | Config folder"
  ansible.builtin.file:
    mode: "0755"
    path: "{{ ansible_user_dir }}/.config/matugen"
    state: directory

- name: "matugen | Templates folder"
  ansible.builtin.file:
    mode: "0755"
    path: "{{ ansible_user_dir }}/.config/matugen/templates"
    state: directory

- name: "matugen | Deploy config.toml"
  ansible.builtin.copy:
    src: "matugen/config.toml"
    dest: "{{ ansible_user_dir }}/.config/matugen/config.toml"
    mode: "0644"

- name: "matugen | Deploy template files"
  ansible.builtin.copy:
    src: "matugen/templates/"
    dest: "{{ ansible_user_dir }}/.config/matugen/templates/"
    mode: "0644"
