# Dynamic Material You colors from matugen
source = ~/.config/hypr/matugen-hyprlock-colors.conf

# Fallback colors (used when matugen hasn't run yet)
$base      = rgb(3C3836)
$mantle    = rgb(282828)
$crust     = rgb(1D2021)
$text      = rgb(EBDBB2)
$subtext0  = rgb(D5C4A1)
$surface0  = rgb(665C54)
$mauve     = rgb(A89984)
$green     = rgb(98971A)
$red       = rgb(CC241D)
$peach     = rgb(FE8019)
$base_alpha85   = rgba(3C3836D9)
$mantle_alpha60 = rgba(28282899)
$mauve_alpha30  = rgba(A899844D)

# ============================================================================
# GENERAL
# ============================================================================
general {
    no_fade_in           = false
    grace                = 0
    disable_loading_bar  = true
    hide_cursor          = false
    ignore_empty_input   = true
    text_trim            = true
}

# ============================================================================
# BACKGROUND — blurred screenshot of current desktop
# ============================================================================
background {
    monitor      =
    path         = screenshot
    color        = $base_alpha85

    blur_passes  = 4
    blur_size    = 5
    noise        = 0.01
    contrast     = 0.9
    brightness   = 0.55
    vibrancy     = 0.17
    vibrancy_darkness = 0.0
}

# ============================================================================
# TIME (Center)
# ============================================================================
label {
    monitor      =
    text         = cmd[update:1000] echo "$(date +"%H:%M")"
    color        = $text
    font_size    = 120
    font_family  = JetBrainsMono Nerd Font ExtraBold
    shadow_passes = 3
    position     = 0, 150
    halign       = center
    valign       = center
}

# ============================================================================
# DATE (Below Time)
# ============================================================================
label {
    monitor      =
    text         = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color        = $subtext0
    font_size    = 18
    font_family  = JetBrainsMono Nerd Font Bold
    shadow_passes = 3
    position     = 0, 40
    halign       = center
    valign       = center
}

# ============================================================================
# INPUT FIELD (Pill Shape)
# ============================================================================
input-field {
    monitor      =
    size         = 220, 35
    outline_thickness = 2
    dots_size    = 0.2
    dots_spacing = 0.2
    dots_center  = true
    dots_rounding = -1

    # Pill shape
    rounding     = -1

    # Colors
    outer_color  = $mauve
    inner_color  = $surface0
    font_color   = $text

    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <span foreground="##cad3f5"><i>password...</i></span>
    hide_input   = false

    check_color  = $green
    fail_color   = $red
    fail_text    = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $peach

    position     = 0, 120
    halign       = center
    valign       = bottom
}

# ============================================================================
# BOTTOM DOCK (Pill Background)
# ============================================================================
shape {
    monitor      =
    size         = 500, 50
    color        = $mantle_alpha60
    rounding     = -1
    border_size  = 1
    border_color = $mauve_alpha30
    rotate       = 0
    xray         = false

    position     = 0, 40
    halign       = center
    valign       = bottom
    zindex       = 1
}

# ============================================================================
# USER WIDGET (Left side of dock pill)
# ============================================================================
label {
    monitor      =
    text         =   $USER
    color        = $mauve
    font_size    = 12
    font_family  = JetBrainsMono Nerd Font Bold

    position     = -185, 56
    halign       = center
    valign       = bottom
    zindex       = 5
}

# ============================================================================
# BATTERY & LAYOUT (Right side of dock pill)
# ============================================================================
label {
    monitor      =
    text         = cmd[update:1000] echo "<span>󰌌  $(~/.config/hypr/hyprlock/scripts/layout.sh)</span>   <span foreground='##6c7086'>|</span>   <span>$(~/.config/hypr/hyprlock/scripts/battery.sh)</span>"
    color        = $subtext0
    font_size    = 12
    font_family  = JetBrainsMono Nerd Font Bold

    position     = 160, 56
    halign       = center
    valign       = bottom
    zindex       = 5
}
